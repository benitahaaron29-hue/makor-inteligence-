services:
  db:
    image: postgres:16-alpine
    container_name: makor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: makor
      POSTGRES_PASSWORD: makor
      POSTGRES_DB: makor
    ports:
      - "5432:5432"
    volumes:
      - makor-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makor -d makor"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: makor-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://makor:makor@db:5432/makor
      LOG_LEVEL: INFO
      BRIEFING_TIMEZONE: Europe/London
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  makor-db-data:
